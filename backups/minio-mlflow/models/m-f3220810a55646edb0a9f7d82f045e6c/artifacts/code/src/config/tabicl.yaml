# =============================================================================
# TabICL Model Configuration
# =============================================================================

mlflow:
  tracking_uri: "http://mlflow_server:5000"
  experiment_name: "test_cart_to_purchase_prediction_tabicl_v1.0"
  artifact_location: "s3://mlflow/"
  registry_uri: "http://mlflow_server:5000"
  tags:
    task: "cart-to-purchase"
    purpose: "test"
    model_family: "tabicl"

model:
  model_type: "tabicl"
  name: "tabicl_ctp"
  version: "1.0.0"
  type: "classifier"
  description: "TabICL model for cart-to-purchase prediction using in-context learning"
  train_test_split: 0.2
  random_state: 42

  # TabICL parameters
  # Note: TabICL uses in-context learning, so fewer hyperparameters needed
  parameters:
    # Device configuration
    device: "cuda"  # Options: "cuda", "cpu". Use "cpu" for Apple Silicon with disk offloading
    
    # Ensemble configuration
    n_estimators: 8  # Number of ensemble members (views of the dataset)
    
    # Batch size for memory management
    batch_size: 8  # Reduce if OOM errors occur
    
    # Normalization methods for dataset transformations
    norm_methods:  # Options: "none", "power", "quantile"
      - "none"
      - "power"
    
    # Feature shuffle method
    feat_shuffle_method: "latin"  # Options: "latin", "random"
    
    # Class shuffle method  
    class_shuffle_method: "shift"  # Options: "shift", "random"
    
    # Outlier handling
    outlier_threshold: 4.0  # Z-score threshold for clipping outliers
    
    # Prediction settings
    softmax_temperature: 1.0  # Temperature for probability calibration
    
    # Memory optimization (for CPU or large datasets)
    offload_mode: "auto"  # Options: "auto", "disk", "none"
    kv_cache: true  # Enable KV caching for faster repeated inference
    
    # Other settings
    verbose: true
    random_state: 42

  # Memory-efficient settings for large datasets (>50K samples)
  large_dataset_params:
    n_estimators: 4
    batch_size: 2
    offload_mode: "disk"
    kv_cache: false

  # Fast settings for quick experiments
  fast_params:
    n_estimators: 2
    batch_size: 4
    norm_methods:
      - "none"
    offload_mode: "auto"

evaluation:
  thresholds:
    accuracy_score: 0.75  # TabICL may be slightly lower than XGBoost
    f1_score: 0.65
    auc_roc: 0.85

# Feature Configuration
features:
  target_column: "is_purchased"
  # TabICL automatically handles categorical features
  # No need to specify numerical vs categorical - it detects automatically
  training_features:
    - "price"
    - "activity_count"
    - "event_weekday"
    - "event_hour"
    - "user_total_events"
    - "user_total_views"
    - "user_total_carts"
    - "user_total_purchases"
    - "user_view_to_cart_rate"
    - "user_cart_to_purchase_rate"
    - "user_avg_purchase_price"
    - "user_unique_products"
    - "user_unique_categories"
    - "product_total_events"
    - "product_total_views"
    - "product_total_carts"
    - "product_total_purchases"
    - "product_view_to_cart_rate"
    - "product_cart_to_purchase_rate"
    - "product_unique_buyers"
    - "brand_purchase_rate"
    - "price_vs_user_avg"
    - "price_vs_category_avg"
    - "brand"
    - "category_code_level1"
    - "category_code_level2"

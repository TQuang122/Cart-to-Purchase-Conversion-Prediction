# Render Blueprint for Cart-to-Purchase Backend
# Deploy: render-blueprints apply --token YOUR_RENDER_TOKEN --spec render.yaml

services:
  - type: web
    name: ctp-api
    runtime: python311
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port ${PORT}
    envVars:
      - key: MLFLOW_TRACKING_URI
        sync: false
      - key: MLFLOW_S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PREDICT_THRESHOLD
        value: "0.525"
      - key: FEAST_REPO_PATH
        value: /opt/render/project/src/serving_pipeline/models/feast_repo
    autoDeploy: true
